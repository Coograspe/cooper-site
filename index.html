<!DOCTYPE html>
<html lang="en">
<head>
    <style>

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
      
        body {
          height: 100vh;
          font-family: monospace;
          background: #f7f4ee;
        }
      
        .door-page {
          display: flex;
          height: 100vh;
        }
      
        .bio {
          flex: 1;
          padding: 40px;
          border-right: 1px solid black;
        }
      
        .door {
          flex: 1.4;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
        }
      
        .sitemap {
          flex: 1;
          padding: 40px;
          border-left: 1px solid black;
        }
      
      </style>
</head>
<body>

    <div class="door-page">
  
      <div class="bio">
        <h1>Cooper Sperling</h1>
        <p>Designer, printer, publisher. New York.</p>
      </div>
  
      <div class="door">
        <p>enter</p>
      </div>
  
      <div class="sitemap">
        <p>Work</p>
        <p>Desk</p>
        <p>Library</p>
        <p>Archive</p>
        <p>CV</p>
      </div>
  
    </div>
  
  </body>
</html>
