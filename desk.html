  <main class="desk-page">

    <!-- Desk surface — replace div with <img src="..."> when scan is ready -->

    <!-- Cards sit on top of the desk. Add new ones at the top.
         Three types — copy whichever block fits:

         TEXT:  <div class="card card-text"> ... </div>
         IMAGE: <div class="card card-image"> ... </div>
         LINK:  <a class="card card-link" href="..." target="_blank"> ... </a>
    -->
    <div class="desk-cards">

      <!-- LINK card — image that goes somewhere -->
      <a class="card card-link" href="https://www.servinglibrary.org" target="_blank">
        <img src="images/serving-library.jpg" alt="Serving Library">
        <span class="card-caption">Serving Library ↗</span>
      </a>

      <!-- TEXT card — a thought, quote, or note -->
      <div class="card card-text">
        <p>Thinking about how a scene documents itself — who decides what gets archived, what gets lost.</p>
      </div>

      <!-- IMAGE card — a photo or scan, no link -->
      <div class="card card-image">
        <img src="images/placeholder.jpg" alt="">
        <p class="card-caption">SOR issue 3 color separations</p>
      </div>

    </div>
