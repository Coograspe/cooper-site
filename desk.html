    <!--
      HOW TO ADD ITEMS:
      Copy any item block below and paste it here.
      Adjust style="top: __%; left: __%;" to place it on the desk.
      Adjust --rot to tilt it (try values between -8 and 8).

      THREE TYPES:

      1. TEXT NOTE:
         <div class="desk-item item-note" style="top: 20%; left: 10%; --rot: -3deg;">
           <p>Your text here</p>
         </div>

      2. IMAGE:
         <div class="desk-item item-photo" style="top: 40%; left: 55%; --rot: 2deg;">
           <img src="images/yourfile.jpg" alt="">
           <p class="item-caption">optional caption</p>
         </div>

      3. LINK (image or note that goes somewhere):
         <a class="desk-item item-photo item-link" href="https://..." target="_blank" style="top: 30%; left: 70%; --rot: -1deg;">
           <img src="images/yourfile.jpg" alt="">
           <span class="item-caption">Site name ↗</span>
         </a>
    -->

    <div class="desk-item item-note" style="top: 12%; left: 8%; --rot: -3deg;">
